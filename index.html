<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Design Editor</title>
  <meta name="description" content="Design printable pages in standard paper sizes with a local visual editor. Create layouts, add text and shapes, manage layers, and export PNG or PDF.">
  <meta name="keywords" content="page design editor, printable layout, A4 editor, letter size editor, PDF export, canvas design tool">
  <meta name="robots" content="index,follow">
  <meta name="author" content="Page Design Editor">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Page Design Editor">
  <meta property="og:description" content="Local visual editor for printable page layouts with multiple paper sizes and PDF/PNG export.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Page Design Editor">
  <meta name="twitter:description" content="Local visual editor for printable page layouts with multiple paper sizes and PDF/PNG export.">
  <style>
    :root {
      --bg-1: #eef3ea;
      --bg-2: #dcead8;
      --panel: #fdfefb;
      --ink: #163320;
      --muted: #4d6355;
      --line: #d5e2d2;
      --accent: #2f7a47;
      --accent-ink: #f8fffa;
      --danger: #8f3131;
      --canvas-shadow: 0 24px 48px rgba(22, 51, 32, 0.14);
      --left-sidebar-width: 230px;
      --right-sidebar-width: 320px;
      --sidebar-collapsed-width: 34px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 255, 255, 0.85), transparent 32%),
        radial-gradient(circle at 88% 18%, rgba(255, 255, 255, 0.55), transparent 26%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      padding: 18px;
    }

    .app {
      width: min(1500px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line);
      background: rgba(253, 254, 251, 0.88);
      border-radius: 22px;
      box-shadow:
        0 30px 60px rgba(22, 51, 32, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.85), rgba(238, 244, 235, 0.8));
    }

    .title {
      display: grid;
      gap: 2px;
    }

    .title h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .title p {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .top-actions,
    .left-actions,
    .z-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .shell {
      display: grid;
      grid-template-columns: var(--left-sidebar-width) 1fr var(--right-sidebar-width);
      min-height: 820px;
      transition: grid-template-columns 180ms ease;
    }

    .shell.is-left-collapsed {
      grid-template-columns: var(--sidebar-collapsed-width) 1fr var(--right-sidebar-width);
    }

    .shell.is-right-collapsed {
      grid-template-columns: var(--left-sidebar-width) 1fr var(--sidebar-collapsed-width);
    }

    .shell.is-left-collapsed.is-right-collapsed {
      grid-template-columns: var(--sidebar-collapsed-width) 1fr var(--sidebar-collapsed-width);
    }

    .side {
      border-right: 1px solid var(--line);
      padding: 14px;
      position: relative;
      min-width: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(243, 249, 241, 0.72));
    }

    .side.is-collapsed {
      padding: 12px 4px;
    }

    .side.is-collapsed > :not(.sidebar-handle) {
      display: none !important;
    }

    .right {
      border-right: 0;
      border-left: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(240, 246, 238, 0.74));
    }

    .sidebar-handle {
      position: absolute;
      top: 12px;
      width: 24px;
      height: 44px;
      border: 1px solid #bfd3c0;
      background: #f5fbf4;
      color: #1f5d34;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 50;
      padding: 0;
      box-shadow: 0 8px 16px rgba(22, 51, 32, 0.1);
    }

    .sidebar-handle:hover {
      background: #e8f5e8;
      border-color: #9fbcaa;
    }

    .left-handle {
      right: -12px;
      border-radius: 0 10px 10px 0;
    }

    .right-handle {
      left: -12px;
      border-radius: 10px 0 0 10px;
    }

    .panel {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      margin-bottom: 12px;
    }

    .panel h2 {
      margin: 0;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .canvas-zone {
      min-width: 0;
      padding: 20px;
      background:
        linear-gradient(45deg, rgba(22, 51, 32, 0.04) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(22, 51, 32, 0.04) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(22, 51, 32, 0.04) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(22, 51, 32, 0.04) 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
      overflow: auto;
    }

    .canvas-wrap {
      width: fit-content;
      margin: 0 auto;
      padding: 22px;
      border-radius: 18px;
      border: 1px solid rgba(22, 51, 32, 0.12);
      background: rgba(255, 255, 255, 0.7);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    #designCanvas,
    .canvas-container .lower-canvas {
      border: 1px solid rgba(22, 51, 32, 0.16);
      border-radius: 4px;
      box-shadow: var(--canvas-shadow);
      background: #ffffff;
    }

    .canvas-container .upper-canvas {
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button,
    .button {
      border: 1px solid #c7d8c6;
      background: #ffffff;
      color: var(--ink);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: 120ms ease;
    }

    button:hover,
    .button:hover {
      border-color: #adc7b1;
      background: #f4faf4;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
    }

    button.primary:hover {
      filter: brightness(1.05);
    }

    button.danger {
      border-color: #c89494;
      color: var(--danger);
      background: #fff8f8;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 0.74rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid #ccdbca;
      border-radius: 10px;
      padding: 7px 9px;
      font-size: 0.84rem;
      color: var(--ink);
      background: #ffffff;
    }

    .field textarea {
      min-height: 72px;
      resize: vertical;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .statusbar {
      border-top: 1px solid var(--line);
      background: rgba(249, 253, 248, 0.84);
      padding: 8px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    .layers {
      max-height: 250px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .layer-item {
      width: 100%;
      text-align: left;
      border: 0;
      border-bottom: 1px solid #edf4ea;
      border-radius: 0;
      padding: 8px 10px;
      background: #fff;
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--ink);
    }

    .layer-item:last-child {
      border-bottom: 0;
    }

    .layer-item.active {
      background: #eaf6ea;
      color: #1f5d34;
      font-weight: 700;
    }

    .chip {
      font-size: 0.68rem;
      padding: 2px 6px;
      border-radius: 999px;
      background: #edf7ef;
      border: 1px solid #cfe2d1;
      color: #356548;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.45;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1260px) {
      .shell,
      .shell.is-left-collapsed,
      .shell.is-right-collapsed,
      .shell.is-left-collapsed.is-right-collapsed {
        grid-template-columns: 210px 1fr;
      }

      .right {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .sidebar-handle {
        display: none !important;
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .side {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .right {
        border-top: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <h1>Page Design Editor</h1>
      </div>
      <div class="top-actions">
        <button id="newDesignButton">New</button>
        <button id="saveJsonButton">Save JSON</button>
        <button id="loadJsonButton">Load JSON</button>
        <button id="exportPngButton" class="primary">Export PNG</button>
        <button id="exportPdfButton" class="primary">Export PDF</button>
      </div>
    </div>

    <div class="shell" id="appShell">
      <aside class="side" id="leftSidebar">
        <button id="leftSidebarHandle" class="sidebar-handle left-handle" type="button" aria-label="Collapse left toolbar" title="Collapse left toolbar">&lt;</button>
        <div class="panel">
          <h2>Page</h2>
          <div class="field">
            <label for="pageSizeSelect">Page Size</label>
            <select id="pageSizeSelect"></select>
          </div>
          <div class="field">
            <label for="orientationSelect">Orientation</label>
            <select id="orientationSelect">
              <option value="portrait">Portrait</option>
              <option value="landscape">Landscape</option>
            </select>
          </div>
          <div class="field">
            <label for="backgroundColorInput">Page Color</label>
            <input id="backgroundColorInput" type="color" value="#ffffff">
          </div>
          <p class="hint" id="pageSizeHint">Canvas at 96 DPI for editing. Export uses full selected page size.</p>
        </div>

        <div class="panel">
          <h2>Add</h2>
          <div class="left-actions">
            <button id="addTextButton">Text</button>
            <button id="addRectButton">Rectangle</button>
            <button id="addCircleButton">Circle</button>
            <button id="addLineButton">Line</button>
            <button id="addImageButton">Image</button>
          </div>
        </div>

        <div class="panel">
          <h2>Arrange</h2>
          <div class="z-actions">
            <button id="bringForwardButton">Bring Forward</button>
            <button id="sendBackwardButton">Send Backward</button>
            <button id="duplicateButton">Duplicate</button>
            <button id="deleteButton" class="danger">Delete</button>
          </div>
        </div>

        <div class="panel">
          <h2>Shortcuts</h2>
          <p class="hint">
            Delete: remove selected object<br>
            Ctrl/Cmd + C then Ctrl/Cmd + V: copy/paste<br>
            Ctrl/Cmd + D: duplicate selected
          </p>
        </div>
      </aside>

      <main class="canvas-zone">
        <div class="canvas-wrap">
          <canvas id="designCanvas" width="794" height="1123" aria-label="Design canvas"></canvas>
        </div>
      </main>

      <aside class="side right" id="rightSidebar">
        <button id="rightSidebarHandle" class="sidebar-handle right-handle" type="button" aria-label="Collapse right toolbar" title="Collapse right toolbar">&gt;</button>
        <div class="panel">
          <h2>Selection</h2>
          <div class="field">
            <label>Type</label>
            <input id="objectTypeInput" type="text" readonly>
          </div>
          <div class="field hidden" id="textFieldRow">
            <label for="textContentInput">Text</label>
            <textarea id="textContentInput"></textarea>
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="leftInput">X</label>
              <input id="leftInput" type="number" step="1">
            </div>
            <div class="field">
              <label for="topInput">Y</label>
              <input id="topInput" type="number" step="1">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="widthInput">Width</label>
              <input id="widthInput" type="number" step="1">
            </div>
            <div class="field">
              <label for="heightInput">Height</label>
              <input id="heightInput" type="number" step="1">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="angleInput">Rotation</label>
              <input id="angleInput" type="number" step="1">
            </div>
            <div class="field">
              <label for="opacityInput">Opacity (0-1)</label>
              <input id="opacityInput" type="number" min="0" max="1" step="0.05">
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="fillColorInput">Fill</label>
              <input id="fillColorInput" type="color" value="#1f2937">
            </div>
            <div class="field">
              <label for="strokeColorInput">Stroke</label>
              <input id="strokeColorInput" type="color" value="#000000">
            </div>
          </div>
          <div class="field">
            <label for="strokeWidthInput">Stroke Width</label>
            <input id="strokeWidthInput" type="number" min="0" step="0.5">
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="fontFamilySelect">Font Family</label>
              <select id="fontFamilySelect">
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Georgia">Georgia</option>
                <option value="Verdana">Verdana</option>
              </select>
            </div>
            <div class="field">
              <label for="fontSizeInput">Font Size</label>
              <input id="fontSizeInput" type="number" min="6" step="1">
            </div>
          </div>
        </div>

        <div class="panel">
          <h2>Layers</h2>
          <div class="layers" id="layersPanel"></div>
        </div>
      </aside>
    </div>

    <div class="statusbar" id="statusText">Ready.</div>
  </div>

  <input id="imageInput" type="file" accept="image/*" class="hidden">
  <input id="jsonInput" type="file" accept=".json,application/json" class="hidden">

  <script src="./fabric.min.js"></script>
  <script src="./jspdf.umd.min.js"></script>
  <script>
    (function () {
      if (!window.fabric) {
        const status = document.getElementById("statusText");
        if (status) {
          status.textContent = "Local fabric.min.js not found or failed to load.";
        }
        [
          "addTextButton",
          "addRectButton",
          "addCircleButton",
          "addLineButton",
          "addImageButton"
        ].forEach((id) => {
          const btn = document.getElementById(id);
          if (!btn) return;
          btn.addEventListener("click", () => {
            const statusNode = document.getElementById("statusText");
            if (statusNode) {
              statusNode.textContent = "Editor engine missing: check local fabric.min.js in this folder.";
            }
          });
        });
        return;
      }

      const MM_PER_INCH = 25.4;
      const PX_PER_INCH = 96;
      const PAGE_SIZES = {
        a3: { label: "A3", mm: [297, 420] },
        a4: { label: "A4", mm: [210, 297] },
        a5: { label: "A5", mm: [148, 210] },
        a6: { label: "A6", mm: [105, 148] },
        b4: { label: "B4 (ISO)", mm: [250, 353] },
        b5: { label: "B5 (ISO)", mm: [176, 250] },
        letter: { label: "Letter (US)", mm: [8.5 * MM_PER_INCH, 11 * MM_PER_INCH] },
        legal: { label: "Legal (US)", mm: [8.5 * MM_PER_INCH, 14 * MM_PER_INCH] },
        tabloid: { label: "Tabloid (US)", mm: [11 * MM_PER_INCH, 17 * MM_PER_INCH] },
        executive: { label: "Executive (US)", mm: [7.25 * MM_PER_INCH, 10.5 * MM_PER_INCH] },
        statement: { label: "Statement (US)", mm: [5.5 * MM_PER_INCH, 8.5 * MM_PER_INCH] },
        folio: { label: "Folio", mm: [210, 330] }
      };

      const canvasEl = document.getElementById("designCanvas");
      const appShell = document.getElementById("appShell");
      const leftSidebar = document.getElementById("leftSidebar");
      const rightSidebar = document.getElementById("rightSidebar");
      const leftSidebarHandle = document.getElementById("leftSidebarHandle");
      const rightSidebarHandle = document.getElementById("rightSidebarHandle");
      const pageSizeSelect = document.getElementById("pageSizeSelect");
      const orientationSelect = document.getElementById("orientationSelect");
      const backgroundColorInput = document.getElementById("backgroundColorInput");
      const pageSizeHint = document.getElementById("pageSizeHint");
      const addTextButton = document.getElementById("addTextButton");
      const addRectButton = document.getElementById("addRectButton");
      const addCircleButton = document.getElementById("addCircleButton");
      const addLineButton = document.getElementById("addLineButton");
      const addImageButton = document.getElementById("addImageButton");
      const imageInput = document.getElementById("imageInput");
      const bringForwardButton = document.getElementById("bringForwardButton");
      const sendBackwardButton = document.getElementById("sendBackwardButton");
      const duplicateButton = document.getElementById("duplicateButton");
      const deleteButton = document.getElementById("deleteButton");
      const newDesignButton = document.getElementById("newDesignButton");
      const saveJsonButton = document.getElementById("saveJsonButton");
      const loadJsonButton = document.getElementById("loadJsonButton");
      const jsonInput = document.getElementById("jsonInput");
      const exportPngButton = document.getElementById("exportPngButton");
      const exportPdfButton = document.getElementById("exportPdfButton");
      const statusText = document.getElementById("statusText");
      const layersPanel = document.getElementById("layersPanel");

      const objectTypeInput = document.getElementById("objectTypeInput");
      const textFieldRow = document.getElementById("textFieldRow");
      const textContentInput = document.getElementById("textContentInput");
      const leftInput = document.getElementById("leftInput");
      const topInput = document.getElementById("topInput");
      const widthInput = document.getElementById("widthInput");
      const heightInput = document.getElementById("heightInput");
      const angleInput = document.getElementById("angleInput");
      const opacityInput = document.getElementById("opacityInput");
      const fillColorInput = document.getElementById("fillColorInput");
      const strokeColorInput = document.getElementById("strokeColorInput");
      const strokeWidthInput = document.getElementById("strokeWidthInput");
      const fontFamilySelect = document.getElementById("fontFamilySelect");
      const fontSizeInput = document.getElementById("fontSizeInput");
      let canvas = null;

      const SIDEBAR_STATE_KEY = "pageDesignEditorSidebarStateV1";
      let copiedObject = null;
      let selectedPageSizeKey = "a4";
      let selectedOrientation = "portrait";
      let sidebarState = {
        leftCollapsed: false,
        rightCollapsed: false
      };

      function setStatus(message) {
        statusText.textContent = message;
      }

      function saveSidebarState() {
        try {
          localStorage.setItem(SIDEBAR_STATE_KEY, JSON.stringify(sidebarState));
        } catch (error) {
        }
      }

      function loadSidebarState() {
        try {
          const raw = localStorage.getItem(SIDEBAR_STATE_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          sidebarState.leftCollapsed = Boolean(parsed && parsed.leftCollapsed);
          sidebarState.rightCollapsed = Boolean(parsed && parsed.rightCollapsed);
        } catch (error) {
        }
      }

      function updateSidebarHandleStates(leftCollapsed, rightCollapsed, isCompact) {
        if (leftSidebarHandle) {
          leftSidebarHandle.hidden = isCompact;
          leftSidebarHandle.textContent = leftCollapsed ? ">" : "<";
          leftSidebarHandle.title = leftCollapsed ? "Expand left toolbar" : "Collapse left toolbar";
          leftSidebarHandle.setAttribute("aria-label", leftSidebarHandle.title);
        }
        if (rightSidebarHandle) {
          rightSidebarHandle.hidden = isCompact;
          rightSidebarHandle.textContent = rightCollapsed ? "<" : ">";
          rightSidebarHandle.title = rightCollapsed ? "Expand right toolbar" : "Collapse right toolbar";
          rightSidebarHandle.setAttribute("aria-label", rightSidebarHandle.title);
        }
      }

      function renderSidebarState() {
        const isCompact = window.matchMedia("(max-width: 1260px)").matches;
        const leftCollapsed = !isCompact && sidebarState.leftCollapsed;
        const rightCollapsed = !isCompact && sidebarState.rightCollapsed;

        if (appShell) {
          appShell.classList.toggle("is-left-collapsed", leftCollapsed);
          appShell.classList.toggle("is-right-collapsed", rightCollapsed);
        }
        if (leftSidebar) {
          leftSidebar.classList.toggle("is-collapsed", leftCollapsed);
        }
        if (rightSidebar) {
          rightSidebar.classList.toggle("is-collapsed", rightCollapsed);
        }
        updateSidebarHandleStates(leftCollapsed, rightCollapsed, isCompact);
      }

      function toggleSidebar(side) {
        if (side === "left") {
          sidebarState.leftCollapsed = !sidebarState.leftCollapsed;
        } else {
          sidebarState.rightCollapsed = !sidebarState.rightCollapsed;
        }
        saveSidebarState();
        renderSidebarState();
      }

      function safeAction(action, failurePrefix) {
        return function () {
          try {
            return action.apply(null, arguments);
          } catch (error) {
            const detail = error && error.message ? ": " + error.message : "";
            setStatus(failurePrefix + detail);
          }
        };
      }

      function clampNumber(value, min, max, fallback) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return fallback;
        if (typeof min === "number" && parsed < min) return min;
        if (typeof max === "number" && parsed > max) return max;
        return parsed;
      }

      function getObjectLabel(object) {
        if (!object) return "None";
        if (object.type === "i-text" || object.type === "textbox" || object.type === "text") return "Text";
        if (object.type === "rect") return "Rectangle";
        if (object.type === "circle") return "Circle";
        if (object.type === "line") return "Line";
        if (object.type === "image") return "Image";
        return object.type || "Object";
      }

      function makeDownload(filename, dataUrl) {
        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      function refreshLayers() {
        const objects = canvas.getObjects();
        const active = canvas.getActiveObject();
        layersPanel.innerHTML = "";

        if (!objects.length) {
          const empty = document.createElement("div");
          empty.className = "layer-item";
          empty.textContent = "No objects";
          layersPanel.appendChild(empty);
          return;
        }

        for (let i = objects.length - 1; i >= 0; i -= 1) {
          const object = objects[i];
          const button = document.createElement("button");
          button.type = "button";
          button.className = "layer-item" + (active === object ? " active" : "");
          button.innerHTML =
            "<span>" + getObjectLabel(object) + "</span><span class='chip'>L" + (i + 1) + "</span>";
          button.addEventListener("click", () => {
            canvas.setActiveObject(object);
            canvas.requestRenderAll();
            updateInspector();
          });
          layersPanel.appendChild(button);
        }
      }

      function mmToPx(mm) {
        return Math.max(1, Math.round((mm / MM_PER_INCH) * PX_PER_INCH));
      }

      function getPageSpec(pageSizeKey, orientation) {
        const resolvedKey = PAGE_SIZES[pageSizeKey] ? pageSizeKey : "a4";
        const base = PAGE_SIZES[resolvedKey];
        const widthMm = base.mm[0];
        const heightMm = base.mm[1];
        const portrait = orientation !== "landscape";
        const pageWidthMm = portrait ? widthMm : heightMm;
        const pageHeightMm = portrait ? heightMm : widthMm;
        return {
          key: resolvedKey,
          label: base.label,
          mm: [pageWidthMm, pageHeightMm],
          px: [mmToPx(pageWidthMm), mmToPx(pageHeightMm)]
        };
      }

      function updatePageSizeHint() {
        const spec = getPageSpec(selectedPageSizeKey, selectedOrientation);
        if (!pageSizeHint) return;
        pageSizeHint.textContent =
          spec.label +
          " " +
          selectedOrientation +
          " - " +
          spec.mm[0].toFixed(1) +
          " x " +
          spec.mm[1].toFixed(1) +
          " mm (" +
          spec.px[0] +
          " x " +
          spec.px[1] +
          " px at 96 DPI).";
      }

      function applyPageSize(pageSizeKey, orientation, shouldScaleObjects) {
        const spec = getPageSpec(pageSizeKey, orientation);
        const oldWidth = canvas.getWidth();
        const oldHeight = canvas.getHeight();

        canvas.setWidth(spec.px[0]);
        canvas.setHeight(spec.px[1]);

        if (shouldScaleObjects && oldWidth > 0 && oldHeight > 0) {
          const scaleX = spec.px[0] / oldWidth;
          const scaleY = spec.px[1] / oldHeight;
          canvas.getObjects().forEach((obj) => {
            obj.left = (obj.left || 0) * scaleX;
            obj.top = (obj.top || 0) * scaleY;
            obj.scaleX = (obj.scaleX || 1) * scaleX;
            obj.scaleY = (obj.scaleY || 1) * scaleY;
            obj.setCoords();
          });
        }

        selectedPageSizeKey = spec.key;
        selectedOrientation = orientation;
        canvas.requestRenderAll();
        updatePageSizeHint();
        setStatus("Canvas resized to " + spec.label + " (" + orientation + ").");
      }

      function populatePageSizes() {
        const keys = Object.keys(PAGE_SIZES);
        keys.forEach((key) => {
          const entry = PAGE_SIZES[key];
          const option = document.createElement("option");
          option.value = key;
          option.textContent = entry.label;
          pageSizeSelect.appendChild(option);
        });
        pageSizeSelect.value = selectedPageSizeKey;
      }

      function updateInspector() {
        const active = canvas.getActiveObject();
        const hasObject = Boolean(active);
        const isTextObject = hasObject && (active.type === "i-text" || active.type === "textbox" || active.type === "text");

        objectTypeInput.value = hasObject ? getObjectLabel(active) : "None";
        textFieldRow.classList.toggle("hidden", !isTextObject);

        if (!hasObject) {
          textContentInput.value = "";
          leftInput.value = "";
          topInput.value = "";
          widthInput.value = "";
          heightInput.value = "";
          angleInput.value = "";
          opacityInput.value = "";
          strokeWidthInput.value = "";
          fontSizeInput.value = "";
          refreshLayers();
          return;
        }

        const scaledWidth = (active.width || 0) * (active.scaleX || 1);
        const scaledHeight = (active.height || 0) * (active.scaleY || 1);

        textContentInput.value = active.text || "";
        leftInput.value = Math.round(active.left || 0);
        topInput.value = Math.round(active.top || 0);
        widthInput.value = Math.round(scaledWidth);
        heightInput.value = Math.round(scaledHeight);
        angleInput.value = Math.round(active.angle || 0);
        opacityInput.value = Number(active.opacity == null ? 1 : active.opacity).toFixed(2);
        fillColorInput.value = normalizeColor(active.fill, "#1f2937");
        strokeColorInput.value = normalizeColor(active.stroke, "#000000");
        strokeWidthInput.value = active.strokeWidth == null ? 0 : active.strokeWidth;
        fontFamilySelect.value = active.fontFamily || "Arial";
        fontSizeInput.value = active.fontSize || 36;

        refreshLayers();
      }

      function normalizeColor(colorValue, fallback) {
        if (typeof colorValue !== "string" || !colorValue.trim()) return fallback;
        const value = colorValue.trim();
        if (value.startsWith("#") && (value.length === 4 || value.length === 7)) {
          return value.length === 4
            ? "#" + value[1] + value[1] + value[2] + value[2] + value[3] + value[3]
            : value;
        }
        return fallback;
      }

      function addText() {
        const text = new fabric.IText("New Heading", {
          left: 90,
          top: 100,
          fill: "#1f2937",
          fontFamily: "Arial",
          fontSize: 48,
          fontWeight: 700
        });
        canvas.add(text);
        canvas.setActiveObject(text);
        canvas.requestRenderAll();
        setStatus("Text added.");
      }

      function addRect() {
        const rect = new fabric.Rect({
          left: 110,
          top: 140,
          width: 240,
          height: 120,
          fill: "#e8f4e7",
          stroke: "#2f7a47",
          strokeWidth: 2,
          rx: 10,
          ry: 10
        });
        canvas.add(rect);
        canvas.setActiveObject(rect);
        canvas.requestRenderAll();
        setStatus("Rectangle added.");
      }

      function addCircle() {
        const circle = new fabric.Circle({
          left: 130,
          top: 180,
          radius: 70,
          fill: "#d6ead5",
          stroke: "#2f7a47",
          strokeWidth: 2
        });
        canvas.add(circle);
        canvas.setActiveObject(circle);
        canvas.requestRenderAll();
        setStatus("Circle added.");
      }

      function addLine() {
        const line = new fabric.Line([80, 80, 380, 80], {
          left: 120,
          top: 240,
          stroke: "#264d35",
          strokeWidth: 3
        });
        canvas.add(line);
        canvas.setActiveObject(line);
        canvas.requestRenderAll();
        setStatus("Line added.");
      }

      async function addImageFromFile(file) {
        if (!file) return;
        const dataUrl = await readFileAsDataUrl(file);
        fabric.Image.fromURL(dataUrl, (img) => {
          const maxWidth = canvas.getWidth() * 0.6;
          const maxHeight = canvas.getHeight() * 0.4;
          const scale = Math.min(maxWidth / img.width, maxHeight / img.height, 1);
          img.set({
            left: 80,
            top: 80,
            scaleX: scale,
            scaleY: scale
          });
          canvas.add(img);
          canvas.setActiveObject(img);
          canvas.requestRenderAll();
          setStatus("Image added.");
        }, { crossOrigin: "anonymous" });
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error("Failed to read file"));
          reader.readAsDataURL(file);
        });
      }

      function removeSelected() {
        const activeObject = canvas.getActiveObject();
        if (!activeObject) {
          setStatus("No object selected.");
          return;
        }
        canvas.remove(activeObject);
        canvas.discardActiveObject();
        canvas.requestRenderAll();
        setStatus("Object deleted.");
      }

      function duplicateSelected() {
        const activeObject = canvas.getActiveObject();
        if (!activeObject) {
          setStatus("No object selected.");
          return;
        }
        activeObject.clone((cloned) => {
          cloned.set({
            left: (activeObject.left || 0) + 24,
            top: (activeObject.top || 0) + 24
          });
          canvas.add(cloned);
          canvas.setActiveObject(cloned);
          canvas.requestRenderAll();
          setStatus("Object duplicated.");
        });
      }

      function clearCanvas() {
        canvas.getObjects().slice().forEach((object) => canvas.remove(object));
        canvas.discardActiveObject();
        canvas.requestRenderAll();
      }

      function saveProjectJson() {
        const payload = {
          version: 1,
          type: "single-design",
          pageSize: selectedPageSizeKey,
          orientation: selectedOrientation,
          backgroundColor: backgroundColorInput.value,
          canvas: canvas.toJSON()
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "page-design-project.json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setStatus("Project JSON saved.");
      }

      function loadProjectJson(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const data = JSON.parse(String(reader.result || "{}"));
            const orientation = data.orientation === "landscape" ? "landscape" : "portrait";
            const pageSize = PAGE_SIZES[data.pageSize] ? data.pageSize : "a4";
            pageSizeSelect.value = pageSize;
            orientationSelect.value = orientation;
            applyPageSize(pageSize, orientation, false);
            backgroundColorInput.value = normalizeColor(data.backgroundColor, "#ffffff");
            canvas.backgroundColor = backgroundColorInput.value;

            canvas.loadFromJSON(data.canvas, () => {
              canvas.requestRenderAll();
              updateInspector();
              setStatus("Project JSON loaded.");
            });
          } catch (error) {
            setStatus("Failed to load JSON.");
          }
        };
        reader.readAsText(file);
      }

      function exportPng() {
        const dataUrl = canvas.toDataURL({
          format: "png",
          multiplier: 2,
          enableRetinaScaling: true
        });
        makeDownload("page-design.png", dataUrl);
        setStatus("PNG exported.");
      }

      function exportPdf() {
        const jsPdfRoot = window.jspdf;
        if (!jsPdfRoot || !jsPdfRoot.jsPDF) {
          setStatus("Local jspdf.umd.min.js not found or failed to load.");
          return;
        }

        const spec = getPageSpec(selectedPageSizeKey, selectedOrientation);
        const [pageWidthMm, pageHeightMm] = spec.mm;
        const dataUrl = canvas.toDataURL({
          format: "png",
          multiplier: 2,
          enableRetinaScaling: true
        });
        const doc = new jsPdfRoot.jsPDF({
          orientation: selectedOrientation === "portrait" ? "p" : "l",
          unit: "mm",
          format: [pageWidthMm, pageHeightMm]
        });
        doc.addImage(dataUrl, "PNG", 0, 0, pageWidthMm, pageHeightMm);
        doc.save("page-design.pdf");
        setStatus("PDF exported.");
      }

      function moveZ(direction) {
        const active = canvas.getActiveObject();
        if (!active) {
          setStatus("No object selected.");
          return;
        }
        if (direction === "up") {
          canvas.bringForward(active);
          setStatus("Moved one step forward.");
        } else {
          canvas.sendBackwards(active);
          setStatus("Moved one step backward.");
        }
        canvas.requestRenderAll();
        refreshLayers();
      }

      function applyInspectorChanges() {
        const active = canvas.getActiveObject();
        if (!active) return;

        const left = clampNumber(leftInput.value, -5000, 5000, active.left || 0);
        const top = clampNumber(topInput.value, -5000, 5000, active.top || 0);
        const width = clampNumber(widthInput.value, 1, 10000, (active.width || 1) * (active.scaleX || 1));
        const height = clampNumber(heightInput.value, 1, 10000, (active.height || 1) * (active.scaleY || 1));
        const angle = clampNumber(angleInput.value, -3600, 3600, active.angle || 0);
        const opacity = clampNumber(opacityInput.value, 0, 1, active.opacity == null ? 1 : active.opacity);
        const strokeWidth = clampNumber(strokeWidthInput.value, 0, 500, active.strokeWidth || 0);

        active.set({
          left,
          top,
          angle,
          opacity,
          strokeWidth
        });

        if (active.width && active.height) {
          active.scaleX = width / active.width;
          active.scaleY = height / active.height;
        }

        if (typeof active.fill === "string" || active.type !== "image") {
          active.set("fill", fillColorInput.value);
        }

        if (active.type !== "image") {
          active.set("stroke", strokeColorInput.value);
        }

        if (active.type === "i-text" || active.type === "textbox" || active.type === "text") {
          active.set({
            text: textContentInput.value,
            fontFamily: fontFamilySelect.value,
            fontSize: clampNumber(fontSizeInput.value, 6, 600, active.fontSize || 48)
          });
        }

        active.setCoords();
        canvas.requestRenderAll();
        refreshLayers();
      }

      function setupEvents() {
        if (leftSidebarHandle) {
          leftSidebarHandle.addEventListener("click", safeAction(() => toggleSidebar("left"), "Left toolbar toggle failed"));
        }
        if (rightSidebarHandle) {
          rightSidebarHandle.addEventListener("click", safeAction(() => toggleSidebar("right"), "Right toolbar toggle failed"));
        }

        addTextButton.addEventListener("click", safeAction(addText, "Add text failed"));
        addRectButton.addEventListener("click", safeAction(addRect, "Add rectangle failed"));
        addCircleButton.addEventListener("click", safeAction(addCircle, "Add circle failed"));
        addLineButton.addEventListener("click", safeAction(addLine, "Add line failed"));
        addImageButton.addEventListener("click", safeAction(() => imageInput.click(), "Open image picker failed"));

        imageInput.addEventListener("change", async () => {
          try {
            const file = imageInput.files && imageInput.files[0];
            await addImageFromFile(file);
          } catch (error) {
            setStatus("Image import failed.");
          } finally {
            imageInput.value = "";
          }
        });

        bringForwardButton.addEventListener("click", safeAction(() => moveZ("up"), "Bring forward failed"));
        sendBackwardButton.addEventListener("click", safeAction(() => moveZ("down"), "Send backward failed"));
        duplicateButton.addEventListener("click", safeAction(duplicateSelected, "Duplicate failed"));
        deleteButton.addEventListener("click", safeAction(removeSelected, "Delete failed"));

        newDesignButton.addEventListener("click", () => {
          clearCanvas();
          pageSizeSelect.value = "a4";
          orientationSelect.value = "portrait";
          backgroundColorInput.value = "#ffffff";
          applyPageSize("a4", "portrait", false);
          canvas.backgroundColor = "#ffffff";
          canvas.requestRenderAll();
          setStatus("New design created.");
        });

        saveJsonButton.addEventListener("click", safeAction(saveProjectJson, "Save JSON failed"));
        loadJsonButton.addEventListener("click", safeAction(() => jsonInput.click(), "Open JSON picker failed"));
        jsonInput.addEventListener("change", () => {
          const file = jsonInput.files && jsonInput.files[0];
          loadProjectJson(file);
          jsonInput.value = "";
        });

        exportPngButton.addEventListener("click", safeAction(exportPng, "Export PNG failed"));
        exportPdfButton.addEventListener("click", safeAction(exportPdf, "Export PDF failed"));

        pageSizeSelect.addEventListener("change", () => {
          applyPageSize(pageSizeSelect.value, orientationSelect.value, true);
        });

        orientationSelect.addEventListener("change", () => {
          applyPageSize(pageSizeSelect.value, orientationSelect.value, true);
        });

        backgroundColorInput.addEventListener("input", () => {
          canvas.backgroundColor = backgroundColorInput.value;
          canvas.requestRenderAll();
          setStatus("Background color updated.");
        });

        [
          textContentInput,
          leftInput,
          topInput,
          widthInput,
          heightInput,
          angleInput,
          opacityInput,
          fillColorInput,
          strokeColorInput,
          strokeWidthInput,
          fontFamilySelect,
          fontSizeInput
        ].forEach((control) => {
          control.addEventListener("input", applyInspectorChanges);
          control.addEventListener("change", applyInspectorChanges);
        });

        canvas.on("selection:created", updateInspector);
        canvas.on("selection:updated", updateInspector);
        canvas.on("selection:cleared", updateInspector);
        canvas.on("object:modified", updateInspector);
        canvas.on("object:added", updateInspector);
        canvas.on("object:removed", updateInspector);

        document.addEventListener("keydown", (event) => {
          const active = document.activeElement;
          const isTyping =
            active &&
            (active.tagName === "INPUT" || active.tagName === "TEXTAREA" || active.isContentEditable);
          if (isTyping) return;

          if (event.key === "Delete" || event.key === "Backspace") {
            event.preventDefault();
            removeSelected();
            return;
          }

          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "d") {
            event.preventDefault();
            duplicateSelected();
            return;
          }

          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "c") {
            const activeObject = canvas.getActiveObject();
            if (!activeObject) return;
            activeObject.clone((cloned) => {
              copiedObject = cloned;
              setStatus("Copied.");
            });
          }

          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "v") {
            if (!copiedObject) return;
            copiedObject.clone((cloned) => {
              cloned.set({
                left: (cloned.left || 0) + 24,
                top: (cloned.top || 0) + 24
              });
              canvas.add(cloned);
              canvas.setActiveObject(cloned);
              canvas.requestRenderAll();
              setStatus("Pasted.");
            });
          }
        });

        window.addEventListener("resize", renderSidebarState);
      }

      function init() {
        canvas = new fabric.Canvas(canvasEl, {
          preserveObjectStacking: true,
          fireRightClick: false,
          stopContextMenu: true
        });

        loadSidebarState();
        renderSidebarState();
        populatePageSizes();
        applyPageSize("a4", "portrait", false);
        canvas.backgroundColor = "#ffffff";
        canvas.requestRenderAll();
        setupEvents();
        updateInspector();
        setStatus("Page design editor ready. Fabric " + (window.fabric.version || "loaded") + ".");
      }

      try {
        init();
      } catch (error) {
        const detail = error && error.message ? ": " + error.message : "";
        setStatus("Editor initialization failed" + detail);
      }
    })();
  </script>
</body>
</html>
